apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. POINT TO THE BASE
# This path goes up two directories (out of stg, out of stages) and into base
resources:
  - ../../base

# 2. APPLY STAGE-SPECIFIC OVERRIDES
# Kustomize will automatically deploy these resources into the 'stg' namespace
namespace: stg

# You can optionally add a prefix to all resource names
namePrefix: stg-

# You can override common labels to identify the environment
commonLabels:
  environment: stg