apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        # This is a placeholder tag. Kargo will automatically overwrite it via Kustomize!
        image: public.ecr.aws/nginx/nginx:latest 
        ports:
        - containerPort: 80